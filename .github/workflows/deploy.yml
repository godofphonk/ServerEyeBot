name: Build and Deploy

on:
  push:
    branches: [ master, production ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: godofphonk/servereyebot

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'
    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Download dependencies
      run: go mod download
    - name: Run tests
      run: go test -v ./...
    - name: Install golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.8.0
    - name: Run linter
      run: make lint
    - name: Build
      run: make build

  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        clean: true
    - name: Set BUILD_DATE and VERSION
      run: |
        echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H-%M-%SZ')" >> $GITHUB_ENV
        echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
        echo "COMMIT_SHA=${{ github.sha }}" >> $GITHUB_ENV
    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push Docker image
      run: |
        echo "=== Starting Docker build process ==="
        echo "Build date: ${{ env.BUILD_DATE }}"
        echo "Version: ${{ env.VERSION }}"
        echo "Commit SHA: ${{ env.COMMIT_SHA }}"
        
        UNIQUE_TAG="production-${{ github.sha }}-$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
        echo "Building with unique tag: $UNIQUE_TAG"
        
        echo "=== Cleaning git repository ==="
        git clean -fdx
        git reset --hard HEAD
        git fetch --all --prune
        
        echo "=== Creating isolated build environment ==="
        BUILD_DIR="/tmp/servereyebot-build-$(date +%s)"
        mkdir -p $BUILD_DIR
        cp -r . $BUILD_DIR/
        cd $BUILD_DIR
        
        echo "=== Build context files ==="
        find . -name "*.go" -type f | head -20
        echo "Dockerfile exists: $(test -f Dockerfile && echo 'YES' || echo 'NO')"
        
        echo "=== Building Docker image ==="
        docker system prune -a -f
        docker builder prune -a -f
        
        docker build \
          --no-cache \
          --pull \
          --force-rm \
          --build-arg BUILD_DATE=${{ env.BUILD_DATE }} \
          --build-arg VERSION=${{ env.VERSION }} \
          --build-arg COMMIT_SHA=${{ env.COMMIT_SHA }} \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$UNIQUE_TAG \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          . 2>&1 | tee build.log
        
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "=== BUILD FAILED ==="
          echo "Build log:"
          cat build.log
          exit 1
        fi
        
        echo "=== Build successful ==="
        docker images | grep servereyebot
        
        echo "=== Pushing images ==="
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$UNIQUE_TAG
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:production
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        
        echo "✅ Build and push completed successfully!"

  deploy-production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production'
    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          echo "=== Starting production deployment ==="
          echo "Deploy date: $(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          echo "Commit: ${{ github.sha }}"
          
          sudo mkdir -p /opt/servereyebot
          sudo chown $USER:$USER /opt/servereyebot
          cd /opt/servereyebot
          
          UNIQUE_TAG="production-${{ github.sha }}-$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          
          echo "=== Deploying image: $IMAGE_NAME:$UNIQUE_TAG ==="
          
          echo "=== Stopping services ==="
          docker-compose down --remove-orphans || true
          docker stop ServerEyeBot-TelegramBot || true
          docker rm ServerEyeBot-TelegramBot || true
          docker stop ServerEyeBot-PostgreSQL || true
          docker rm ServerEyeBot-PostgreSQL || true
          
          echo "=== Cleaning up Docker images ==="
          docker system prune -a -f
          
          echo "=== Pulling new image ==="
          docker pull $IMAGE_NAME:production
          docker pull $IMAGE_NAME:latest
          
          echo "=== Pulled images ==="
          docker images | grep servereyebot
          
          echo "=== Creating external volumes ==="
          docker volume create servereyebot_postgres_data || true
          
          echo "=== Creating backup before deployment ==="
          mkdir -p /opt/servereyebot/backups
          if docker volume inspect servereyebot_postgres_data >/dev/null 2>&1; then
            docker run --rm -v servereyebot_postgres_data:/data -v /opt/servereyebot/backups:/backup alpine tar czf /backup/postgres_backup_$(date +%Y%m%d_%H%M%S).tar.gz -C /data .
            echo "✅ PostgreSQL backup created"
          fi
          
          cat > docker-compose.yml << 'COMPOSE_EOF'
          services:
            servereyebot:
              image: ghcr.io/godofphonk/servereyebot:production
              container_name: ServerEyeBot-TelegramBot
              restart: unless-stopped
              environment:
                - TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
                - LOG_LEVEL=${{ vars.LOG_LEVEL || 'info' }}
                - ENV=production
                - API_BASE_URL=https://api.servereye.dev
                - PORT=${{ vars.BOT_PORT || '8091' }}
                - ADMIN_USER_ID=${{ secrets.ADMIN_USER_ID }}
                - DATABASE_URL=postgres://servereyebot@postgres:5432/servereyebot?sslmode=disable
              ports:
                - "${{ vars.BOT_PORT || '8092' }}:8091"
              volumes:
                - ./logs:/app/logs
              networks:
                - servereyebot-network
              depends_on:
                postgres:
                  condition: service_healthy
              healthcheck:
                test: ["CMD", "pgrep", "-f", "servereye-bot"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 40s
            postgres:
              image: postgres:15-alpine
              container_name: ServerEyeBot-PostgreSQL
              restart: unless-stopped
              environment:
                - POSTGRES_DB=servereyebot
                - POSTGRES_USER=servereyebot
                - POSTGRES_HOST_AUTH_METHOD=trust
              ports:
                - "${{ vars.POSTGRES_PORT || '5434' }}:5432"
              volumes:
                - servereyebot_postgres_data:/var/lib/postgresql/data
              networks:
                - servereyebot-network
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U servereyebot -d servereyebot"]
                interval: 10s
                timeout: 5s
                retries: 5
          volumes:
            servereyebot_postgres_data:
              external: true
          networks:
            servereyebot-network:
              driver: bridge
          COMPOSE_EOF
          
          echo "=== Docker compose file created ==="
          
          echo "=== Starting database services ==="
          docker-compose up -d postgres
          echo "Waiting for database to start..."
          sleep 15
          
          echo "=== Checking database health ==="
          docker-compose ps postgres
          docker logs ServerEyeBot-PostgreSQL --tail 10
          
          echo "=== Creating migration files ==="
          mkdir -p migrations
          
          echo 'CREATE TABLE IF NOT EXISTS users (id SERIAL PRIMARY KEY, telegram_id BIGINT UNIQUE NOT NULL, username VARCHAR(255), first_name VARCHAR(255), last_name VARCHAR(255), is_active BOOLEAN DEFAULT true, is_admin BOOLEAN DEFAULT false, created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP);' > migrations/001_initial_schema.sql
          echo 'CREATE TABLE IF NOT EXISTS servers (id SERIAL PRIMARY KEY, server_id VARCHAR(255) UNIQUE NOT NULL, name VARCHAR(255) NOT NULL, description TEXT, ip_address INET, port INTEGER DEFAULT 8080, is_active BOOLEAN DEFAULT true, created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP);' >> migrations/001_initial_schema.sql
          echo 'CREATE TABLE IF NOT EXISTS user_servers (id SERIAL PRIMARY KEY, user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE, server_id INTEGER NOT NULL REFERENCES servers(id) ON DELETE CASCADE, server_key VARCHAR(255) NOT NULL, is_monitoring BOOLEAN DEFAULT true, created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP, updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP, UNIQUE(user_id, server_id));' >> migrations/001_initial_schema.sql
          echo 'CREATE INDEX IF NOT EXISTS idx_users_telegram_id ON users(telegram_id);' >> migrations/001_initial_schema.sql
          echo 'CREATE INDEX IF NOT EXISTS idx_servers_server_id ON servers(server_id);' >> migrations/001_initial_schema.sql
          echo 'CREATE INDEX IF NOT EXISTS idx_user_servers_user_id ON user_servers(user_id);' >> migrations/001_initial_schema.sql
          echo 'CREATE INDEX IF NOT EXISTS idx_user_servers_server_id ON user_servers(server_id);' >> migrations/001_initial_schema.sql
          echo 'CREATE INDEX IF NOT EXISTS idx_user_servers_server_key ON user_servers(server_key);' >> migrations/001_initial_schema.sql
          echo 'CREATE OR REPLACE FUNCTION update_updated_at_column() RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = CURRENT_TIMESTAMP; RETURN NEW; END; $$ language plpgsql;' >> migrations/001_initial_schema.sql
          echo 'CREATE TRIGGER update_users_updated_at BEFORE UPDATE ON users FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();' >> migrations/001_initial_schema.sql
          echo 'CREATE TRIGGER update_servers_updated_at BEFORE UPDATE ON servers FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();' >> migrations/001_initial_schema.sql
          echo 'CREATE TRIGGER update_user_servers_updated_at BEFORE UPDATE ON user_servers FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();' >> migrations/001_initial_schema.sql
          
          echo 'CREATE OR REPLACE FUNCTION update_server_name(p_user_id INTEGER, p_server_id INTEGER, p_new_name VARCHAR(255)) RETURNS BOOLEAN AS $$ DECLARE server_exists BOOLEAN; BEGIN SELECT EXISTS(SELECT 1 FROM user_servers WHERE user_id = p_user_id AND server_id = p_server_id) INTO server_exists; IF NOT server_exists THEN RETURN FALSE; END IF; UPDATE servers SET name = p_new_name WHERE id = p_server_id; RETURN FOUND; END; $$ LANGUAGE plpgsql;' > migrations/002_add_server_name_update.sql
          
          echo "Migration files created:"
          ls -la migrations/
          
          echo "=== Applying database migrations ==="
          echo "Applying migration 001:"
          docker exec -i ServerEyeBot-PostgreSQL psql -U servereyebot -d servereyebot < migrations/001_initial_schema.sql
          
          echo "Applying migration 002:"
          docker exec -i ServerEyeBot-PostgreSQL psql -U servereyebot -d servereyebot < migrations/002_add_server_name_update.sql
          
          echo "=== Verifying migrations ==="
          docker exec ServerEyeBot-PostgreSQL psql -U servereyebot -d servereyebot -c "\\dt"
          docker exec ServerEyeBot-PostgreSQL psql -U servereyebot -d servereyebot -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = public;"
          
          echo "=== Starting main application ==="
          docker-compose up -d servereyebot
          
          echo "=== Waiting for services to start ==="
          sleep 60
          
          echo "=== Checking service health ==="
          docker-compose ps
          echo "=== Bot logs ==="
          docker logs ServerEyeBot-TelegramBot --tail 20
          
          echo "=== Testing database ==="
          docker exec ServerEyeBot-PostgreSQL psql -U servereyebot -d servereyebot -c "SELECT table_name FROM information_schema.tables WHERE table_schema = public ORDER BY table_name;"
          
          docker image prune -f
          echo "✅ Production deployment completed successfully!"
          echo "=== Deployment finished at: $(date -u +'%Y-%m-%dT%H-%M-%SZ') ==="
