services:
  servereye-bot-vpn:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.local-vpn
    container_name: ServerEyeBot-VPN
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENV=${ENV:-development}
      - API_BASE_URL=${API_BASE_URL:-http://servereye-api:8080}
      - PORT=${PORT:-8091}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      - DATABASE_URL=postgres://servereyebot:servereye123@bot-postgres:5432/servereyebot?sslmode=disable
    ports:
      - "8094:8091"
    volumes:
      - ../logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - servereye-network
    depends_on:
      bot-postgres:
        condition: service_healthy
    privileged: true  # Required for VPN
    cap_add:
      - NET_ADMIN
      - SYS_MODULE

  bot-postgres:
    image: postgres:15-alpine
    container_name: ServerEyeBot-PostgreSQL-Local
    restart: unless-stopped
    environment:
      - POSTGRES_DB=servereyebot
      - POSTGRES_USER=servereyebot
      - POSTGRES_PASSWORD=servereye123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - servereyebot_postgres_local_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5435:5432"
    networks:
      - servereye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servereyebot -d servereyebot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  servereyebot_postgres_local_data:
    driver: local

networks:
  servereye-network:
    driver: bridge
